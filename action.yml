name: Discord Commits
author: itz-coffee
description: >
  Send commits to Discord using a webhook.
inputs:
  webhookUrl:
    description: Discord webhook URL. Should be stored in a secret and inserted as a context expression.
    required: true
  staffWebhookUrl:
    description: Discord webhook URL for staff-only channel. Commits prefixed with !! are sent here instead.
    required: false
  testMessage:
    description: Optional test message to send via workflow_dispatch instead of real commit data.
    required: false
  testType:
    description: "Which commit type to test: all, normal, merge, or delete"
    required: false
  authorOverrides:
    description: "JSON map of GitHub login -> { name, icon_url, url } to replace embed author identity per commit."
    required: false
    default: "{}"
runs:
  using: "node24"
  main: "dist/index.js"
branding:
  color: orange
  icon: alert-triangle
